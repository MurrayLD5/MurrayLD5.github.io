<html>
    <link id="stylesheetmain" rel="stylesheet" href="styles/style.css">
    <script>
        function update_stylesheet() {
            if (window.innerWidth <= window.innerHeight) {
                window.location.href = "homep.html";
            };
        };
        update_stylesheet();
    </script>
    <head>
        <title>MurrayLD - Home</title>
    </head>
    <header class="banner">
        <iframe src="headerpage.html" width="100%" height="125px" style="border: none"></iframe>
    </header>
    <body>
        <image id="backgroundimage" src="images/portfolio/liveeventsworkshop/liveeventsworkshop3.png" style="filter: brightness(30%); position: fixed; top: 100px; left: 0px; z-index:-10"></image>
        <script>
            var which_image = Math.floor(Math.random() * 3);
            console.log(which_image);
            if (which_image == 0) {
                document.getElementById("backgroundimage").src = "images/portfolio/liveeventsworkshop/liveeventsworkshop1.png";
            };
            if (which_image == 1) {
                document.getElementById("backgroundimage").src = "images/portfolio/liveeventsworkshop/liveeventsworkshop2.png";
            };
            if (which_image == 2) {
                document.getElementById("backgroundimage").src = "images/portfolio/liveeventsworkshop/liveeventsworkshop3.png";
            };
            if (window.innerWidth >= window.innerHeight) {
                document.getElementById("backgroundimage").width = window.innerWidth * 1.1;
            };
            if (window.innerWidth < window.innerHeight) {
                document.getElementById("backgroundimage").height = window.innerHeight * 1.1;
            };
            function update_y() {
                document.getElementById("backgroundimage").style.top = -(window.scrollY) / 10;
                setTimeout(update_y, 10);
            };
            update_y();
        </script>
        <div id="welcome">
            <video src="videos/Top Text.mp4" autoplay muted width="100%"></video>
        </div>
        <div id="about" style="background-image: url('images/breakimages/break1.png')">
            <p id="subtext">Aspiring lighting designer</p>
        </div>
        <div id="companiesiworkwith" style="background-image: url('images/breakimages/break4.png')">
            <p>Companies I work with:</p>
            <center><table width="50%">
                <tr width="100%">
                    <td><a href="https://youngtechacademy.co.uk/" target="_blank"><image class="softwareiuselogo" src="images/logos/ytlogo.png"></image></a></td>
                    <td><a href="https://limelight-academy.co.uk/" target="_blank"><image class="softwareiuselogo2" src="images/logos/logolapa.png"></image></a></td>
                    <td><a href="https://medusalive.co.uk/" target="_blank"><image class="softwareiuselogo" src="images/logos/mllogo.png"></image></a></td>
                    <td><a href="https://www.phantomliveevents.co.uk/" target="_blank"><image class="softwareiuselogo2" src="images/logos/logople.png"></image></a></td>
                </tr>
            </table></center>
        </div>
        <div id="softwareiuse" style="background-image: url('images/breakimages/break2.png')">
            <p>Tools I use:</p>
            <center><table width="50%">
                <tr width="100%">
                    <td><a href="https://www.avolites.com/" target="_blank"><image class="softwareiuselogo" src="images/logos/logoavolites.png"></image></a></td>
                    <td><a href="https://www.blender.org/" target="_blank"><image class="softwareiuselogo2" src="images/logos/logoblender.png"></image></a></td>
                    <td><a href="https://www.capture.se/" target="_blank"><image class="softwareiuselogo" src="images/logos/logocapture.png"></image></a></td>
                    <td><a href="https://chamsyslighting.com/" target="_blank"><image class="softwareiuselogo2" src="images/logos/logochamsys.png"></image></a></td>
                    <td><a href="https://www.gimp.org/" target="_blank"><image class="softwareiuselogo" src="images/logos/logogimp.png"></image></a></td>
                </tr>
            </table></center>
        </div>
        <script>
            //document.getElementById("topclip").currentTime = Math.floor(Math.random() * 19);;
            //document.getElementById("topclip").play();
            var opacity_about = 0;
            var opacity_softwareiuse = 0;
            var opacity_companiesiworkwith = 0;
            function update_opacity() {
                if ((document.getElementById("about").getBoundingClientRect().top) < window.innerHeight) {
                    if (opacity_about < 100) {
                        opacity_about = opacity_about + 1;
                    };
                }
                else {
                    opacity_about = 0;
                };
                if ((document.getElementById("softwareiuse").getBoundingClientRect().top) < window.innerHeight) {
                    if (opacity_softwareiuse < 100) {
                        opacity_softwareiuse = opacity_softwareiuse + 1;
                    };
                }
                else {
                    opacity_softwareiuse = 0;
                };
                if ((document.getElementById("companiesiworkwith").getBoundingClientRect().top) < window.innerHeight) {
                    if (opacity_companiesiworkwith < 100) {
                        opacity_companiesiworkwith = opacity_companiesiworkwith + 1;
                    };
                }
                else {
                    opacity_companiesiworkwith = 0;
                };
                document.getElementById("about").style.opacity = opacity_about + "%";
                document.getElementById("softwareiuse").style.opacity = opacity_softwareiuse + "%";
                document.getElementById("companiesiworkwith").style.opacity = opacity_companiesiworkwith + "%";
                setTimeout(update_opacity, 10);
            }
            update_opacity();
        </script>
    </body>
    <footer>
        <iframe id="footerpage" src="footerpage.html" style="border: none; height: 250px" width="100%"></iframe>
    </footer>
</html>

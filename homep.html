    <body style="overflow-x: hidden">
        <image id="backgroundimage" src="images/backgroundimage.png"></image>
        <div id="welcome" width="100%">
            <video src="videos/Top Text.mp4" autoplay muted width="100%"></video>
        </div>
        <div id="about" style="background-image: url('images/breakimages/break1.png')">
            <p id="subtext">Aspiring lighting designer</p>
        </div>
        <div id="companiesiworkwith" style="background-image: url('images/breakimages/break4.png')">
            <p>Companies I have worked with:</p>

                    <tr width="100%" style="margin: auto"><td><center><a href="https://medusalive.co.uk/" target="_blank"><image class="softwareiuselogo2" src="images/logos/mllogo.png"></image></a></center></td></tr>
                    <tr width="100%" style="margin: auto"><td><center><a href="https://www.phantomliveevents.co.uk/" target="_blank"><image class="softwareiuselogo" src="images/logos/logople.png"></image></a></center></td></tr>
                    <tr width="100%" style="margin: auto"><td><center><a href="https://youngtechacademy.co.uk/" target="_blank"><image class="softwareiuselogo2" src="images/logos/ytlogo.png"></image></a></center></td></tr>
            </table></center>

        <div id="softwareiuse" style="background-image: url('images/breakimages/break2.png')">
            <p>Tools I use:</p>
            <center><table width="50%">
                    <tr width="100%" style="margin: auto"><td><center><a href="https://www.avolites.com/" target="_blank"><image class="softwareiuselogo" src="images/logos/logoavolites.png"></image></a></center></td></tr>
                    <tr width="100%" style="margin: auto"><td><center><a href="https://www.blender.org/" target="_blank"><image class="softwareiuselogo2" src="images/logos/logoblender.png"></image></a></center></td></tr>

                    <tr width="100%" style="margin: auto"><td><center><a href="https://chamsyslighting.com/" target="_blank"><image class="softwareiuselogo2" src="images/logos/logochamsys.png"></image></a></center></td></tr>
                    <tr width="100%" style="margin: auto"><td><center><a href="https://www.gimp.org/" target="_blank"><image class="softwareiuselogo" src="images/logos/logogimp.png"></image></a></center></td></tr>
            </table></center>
        </div>
        <script>
            //document.getElementById("topclip").currentTime = Math.floor(Math.random() * 19);;
            //document.getElementById("topclip").play();
            var opacity_about = 0;
            var opacity_softwareiuse = 0;
            var opacity_companiesiworkwith = 0;
            function update_opacity() {
                if ((document.getElementById("about").getBoundingClientRect().top) < window.innerHeight) {
                    if (opacity_about < 100) {
                        opacity_about = opacity_about + 1;
                    };
                }
                else {
                    opacity_about = 0;
                };
                if ((document.getElementById("softwareiuse").getBoundingClientRect().top) < window.innerHeight) {
                    if (opacity_softwareiuse < 100) {
                        opacity_softwareiuse = opacity_softwareiuse + 1;
                    };
                }
                else {
                    opacity_softwareiuse = 0;
                };
                if ((document.getElementById("companiesiworkwith").getBoundingClientRect().top) < window.innerHeight) {
                    if (opacity_companiesiworkwith < 100) {
                        opacity_companiesiworkwith = opacity_companiesiworkwith + 1;
                    };
                }
                else {
                    opacity_companiesiworkwith = 0;
                };
                document.getElementById("about").style.opacity = opacity_about + "%";
                document.getElementById("softwareiuse").style.opacity = opacity_softwareiuse + "%";
                document.getElementById("companiesiworkwith").style.opacity = opacity_companiesiworkwith + "%";
                setTimeout(update_opacity, 10);
            }
            update_opacity();
        </script>
    </body>

    <link id="stylesheetmain" rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Keania+One">
    <script>
        function update_stylesheet() {
            if (window.outerWidth <= window.outerHeight) {
                document.getElementById("stylesheetmain").href = "stylephone.css";
                console.log("PHONE");
            };
            if (window.outerWidth > window.outerHeight) {
                document.getElementById("stylesheetmain").href = "style.css";
                console.log("NORMAL");
            };
        };
        update_stylesheet();
    </script>
    <body style="background-color: rgb(10, 10, 10)">
        <canvas id="line" style="background-color: rgb(175, 0, 0); position: fixed; top: 0px; left: 0px; width: 0px; height: 1px"></canvas>
        <script>
            var line_width = 0;
            function update_line() {
                if (line_width < window.innerWidth) {
                    line_width = line_width + ((window.innerWidth - line_width) / 25);
                    document.getElementById("line").style.width = line_width + "px";
                    document.getElementById("line").style.height = "3px";
                };
                setTimeout(update_line, 10);
            };
            update_line();
        </script>

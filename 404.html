<html>
    <link id="stylesheetmain" rel="stylesheet" href="styles/stylephone.css">
    <head>
        <title>MurrayLD - 404 Page Not Found</title>
    </head>
    <header class="banner">
        <iframe src="headerpage.html" width="100%" height="125px" style="border: none"></iframe>
    </header>
    <body>
        <image id="backgroundimage" src="images/portfolio/liveeventsworkshop/liveeventsworkshop3.png" style="filter: brightness(30%); position: fixed; top: 100px; left: 0px; z-index:-10"></image>
        <script>
            var which_image = Math.floor(Math.random() * 3);
            console.log(which_image);
            if (which_image == 0) {
                document.getElementById("backgroundimage").src = "images/portfolio/liveeventsworkshop/liveeventsworkshop1.png";
            };
            if (which_image == 1) {
                document.getElementById("backgroundimage").src = "images/portfolio/liveeventsworkshop/liveeventsworkshop2.png";
            };
            if (which_image == 2) {
                document.getElementById("backgroundimage").src = "images/portfolio/liveeventsworkshop/liveeventsworkshop3.png";
            };
            if (window.innerWidth >= window.innerHeight) {
                document.getElementById("backgroundimage").width = window.innerWidth * 1.1;
            };
            if (window.innerWidth < window.innerHeight) {
                document.getElementById("backgroundimage").height = window.innerHeight * 1.1;
            };
            function update_y() {
                document.getElementById("backgroundimage").style.top = -(window.scrollY) / 10;
                setTimeout(update_y, 10);
            };
            update_y();
        </script>
        <table height="100px">
            <tr><td></td></tr>
        </table>
        <div>
            <p>404 -<br><br>Sorry, that page could not be found!</p>
            <h5 width="100%" style="text-align: center; font-size: 100; margin-top: 0px">😔</h5>
            <a href="home.html" style="text-decoration: none"><h1 style="width: 25%; margin: auto; margin-top: -100px">Go to home page</h1></a>
        </div>
    </body>
    <footer>
        <iframe id="footerpage" src="footerpage.html" style="border: none; height: 250px" width="100%"></iframe>
    </footer>
    <script>
        function update_stylesheet() {
            if (window.innerWidth <= window.innerHeight) {
                document.getElementById("stylesheetmain").href = "styles/stylephone.css";
                document.getElementById("footerpage").style.height = "400px";
            };
            if (window.innerWidth > window.innerHeight) {
                document.getElementById("stylesheetmain").href = "styles/style.css";
            };
        };
        update_stylesheet();
    </script>
</html>

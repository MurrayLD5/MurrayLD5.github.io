<html>
    <link id="stylesheetmain" rel="stylesheet" href="stylephone.css">
    <head>
        <title>MurrayLD - Template</title>
        <link rel="icon" type="image/x-icon" href="favicon.ico">
    </head>
    <header id="banner">
        <iframe src="headerpage.html" width="100%" height="125px" style="border: none"></iframe>
    </header>
    <body>
    <div>
        <p>Template page</p>
    </div>
    </body>
    <footer>
        <iframe id="footerpage" src="footerpage.html" style="border: none; height: 250px" width="100%"></iframe>
    </footer>
    <script>
        function update_stylesheet() {
            if (window.innerWidth <= window.innerHeight) {
                document.getElementById("stylesheetmain").href = "stylephone.css";
                document.getElementById("footerpage").style.height = "400px";
            };
            if (window.innerWidth > window.innerHeight) {
                document.getElementById("stylesheetmain").href = "style.css";
            };
        };
        update_stylesheet();
    </script>
</html>

<html>
    <link id="stylesheetmain" rel="stylesheet" href="style.css">

        </div>
        <div>
            <image id="displayedimage" src="images/placeholderimagetext.png"></image>
            <table id="imagethumbnailtable">

                        function changethumbnail_1() {
                            document.getElementById("displayedimage").src = "images/placeholderimagetext.png";
                        };
                        function changethumbnail_2() {
                            document.getElementById("displayedimage").src = "images/placeholderimagetext.png";
                        };

                        };

                    <td><image id="imagethumbnail1" onclick="changethumbnail_1()" class="imagethumbnail" src="images/placeholderimagetext.png"></image></td>

                </tr>

    </body>
    <footer>
        <iframe id="footerpage" src="footerpage.html" style="border: none; height: 250px" width="100%"></iframe>
    </footer>
    <script>
        function update_stylesheet() {
            if (window.innerWidth <= window.innerHeight) {
                document.getElementById("stylesheetmain").href = "stylephone.css";
                document.getElementById("footerpage").style.height = "400px";
            };
            if (window.innerWidth > window.innerHeight) {
                document.getElementById("stylesheetmain").href = "style.css";
            };
        };
        update_stylesheet();
    </script>
</html>

<html>
    <link id="stylesheetmain" rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Keania+One">
    <script>
        function update_stylesheet() {
            if (window.outerWidth <= window.outerHeight) {
                document.getElementById("stylesheetmain").href = "stylephone.css";
                console.log("PHONE");
            };
            if (window.outerWidth > window.outerHeight) {
                document.getElementById("stylesheetmain").href = "style.css";
                console.log("NORMAL");
            };
        };
        update_stylesheet();
    </script>
    <body class="banner" style="background-color: transparent; overflow-y: hidden">
        <table width="100%">
            <tr width="100%">
                <td width="25%">
                    <a href="home.html" target="_top"><image id="toplogo" src="images/header/logomurrayld.png" width="200px"></image></a>
                </td>
                <td width="25%"></td>
                <td width="25%"></td>
                <td width="25%">
                    <table width="100%">
                        <tr width="100%">
                            <td class="linkbox"><a href="home.html" target="_top" style="text-decoration: none" width="33%"><h1>Home</h1></a></td>
                            <td class="linkbox"><a href="portfolio.html" target="_top" style="text-decoration: none" width="33%"><h1>Portfolio</h1></a></td>
                            <td class="linkbox"><a href="contact.html" target="_top" style="text-decoration: none" width="33%"><h1>Contact</h1></a></td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
        <canvas id="line" style="background-color: rgb(175, 0, 0); position: fixed; top: 97px; left: 0px; width: 0px; height: 1px"></canvas>
        <script>
            var line_width = 0;
            function update_line() {
                if (line_width < window.innerWidth) {
                    line_width = line_width + ((window.innerWidth - line_width) / 25);
                    document.getElementById("line").style.width = line_width + "px";
                    document.getElementById("line").style.height = "3px";
                };
                setTimeout(update_line, 10);
            };
            update_line();
        </script>
    </body>
</html>
